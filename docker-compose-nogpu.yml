services:
  go2-humble:
    profiles: ["humble"]
    shm_size: '2gb'
    volumes:
      - ./shared:/shared
      - ./humble_ws:/ws:cached
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /root/.gazebo/models/:/root/.gazebo/models/
      - /var/run/docker.sock:/var/run/docker.sock
      - $HOME/.Xauthority:/tmp/.Xauthority:rw
    environment:
      - DISPLAY=${DISPLAY}
      - XAUTHORITY=/tmp/.Xauthority
      - ROS_DISTRO=humble
    cap_add:
      - SYS_PTRACE
    command: /bin/sh -c "while sleep 1000; do :; done"
    build:
      context: .
      dockerfile: Dockerfile.humble
    privileged: true
    network_mode: "host"
    tty: true

  go2-foxy:
    profiles: ["foxy"]
    shm_size: '2gb'
    volumes:
      - ./shared:/shared
      - ./foxy_ws:/ws:cached
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /root/.gazebo/models/:/root/.gazebo/models/
      - /var/run/docker.sock:/var/run/docker.sock
      - $HOME/.Xauthority:/tmp/.Xauthority:rw
    environment:
      - DISPLAY=${DISPLAY}
      - XAUTHORITY=/tmp/.Xauthority
      - ROS_DISTRO=foxy
    cap_add:
      - SYS_PTRACE
    command: /bin/sh -c "while sleep 1000; do :; done"
    build:
      context: .
      dockerfile: Dockerfile.foxy
    privileged: true
    network_mode: "host"
    tty: true
